    <div class="parts">${r.parts.length?r.parts.map(p=>'<span>'+p+'</span>').join(''):'<span style="color:#776">（無特殊數值）</span>'}</div></div>`).join(''):'<div class="empty">沒有符合條件的道具</div>';
}
document.querySelectorAll('.chip.cat').forEach(c=>c.onclick=()=>{fCat=c.dataset.cat;document.querySelectorAll('.chip.cat').forEach(x=>{x.classList.remove('on');x.style.background='';x.style.color='';});c.classList.add('on');c.style.background=c.dataset.col||'#f5c451';c.style.color='#15100b';render();});
document.getElementById('q').oninput=e=>{fQ=e.target.value.trim();render();};
render();
</script></body></html>
