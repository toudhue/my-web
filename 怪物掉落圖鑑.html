const CAT = {"wild":"野外","dungeon":"地監","special":"世界王","village":"村莊"};
let fCat='',fQ='';const grid=document.getElementById('grid');
const esc=s=>(''+s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function hl(s){if(!fQ)return esc(s);const i=s.toLowerCase().indexOf(fQ.toLowerCase());if(i<0)return esc(s);return esc(s.slice(0,i))+'<mark>'+esc(s.slice(i,i+fQ.length))+'</mark>'+esc(s.slice(i+fQ.length));}
function pcol(p){return p>=50?'#4ade80':p>=5?'#60a5fa':p>=1?'#c084fc':'#f5c451';}
function render(){
  const q=fQ.toLowerCase();
  const list=DATA.filter(r=>{
    if(fCat==='__boss'){if(!r.boss)return false;}
    else if(fCat==='__area'){if(!r.area)return false;}
    else if(fCat){if(!r.cats.includes(fCat))return false;}
    if(q&&!r.find.toLowerCase().includes(q))return false;
    return true;
  });
  grid.innerHTML=list.length?list.map(r=>{
    const bcol=r.boss?'#fbbf24':'#7c6a3a';
    // 關鍵字是道具(怪名不含關鍵字、但有掉落物含關鍵字)→ 只列符合的掉落,其餘收合成一行提示
    let shown=r.drops, note='';
    if(q){
      const md=r.drops.filter(d=>d.n.toLowerCase().includes(q));
      const nameHit=r.n.toLowerCase().includes(q);
      if(md.length){
        if(!nameHit){ shown=md; if(r.drops.length>md.length) note='<div class="nodrop">（此怪另有 '+(r.drops.length-md.length)+' 種其他掉落，清空搜尋可見全部）</div>'; }
        else shown=md.concat(r.drops.filter(d=>!d.n.toLowerCase().includes(q)));   // 怪名也符合:符合的排最前
      }
    }
    const drops=shown.length?shown.map(d=>`<div class="drow"><span class="dn">${hl(d.n)}</span><span class="dp" style="color:${pcol(d.pct)}">${d.pct}%</span></div>`).join('')+note:'<div class="nodrop">（無掉落資料）</div>';
    if(r.area){   // 地區掉落卡:綠框、不顯示 HP/經驗,改顯示說明
      const acol='#34d399';
      return `<div class="card" style="--bcol:${acol}">
        <div class="top"><span class="nm">📍 ${hl(r.n)}</span><span class="tag" style="background:${acol}">地區掉落</span></div>
        <div class="loc"><b>採集地區：</b><span class="z">${esc(r.zones[0])}</span></div>
        <div class="drops">${drops}</div>
        <div class="nodrop">此地區<b>所有怪物</b>擊殺時，各道具獨立 20% 機率掉落（學會被動「世界樹的呼喚」→ 30%）。</div></div>`;
    }
    const loc=r.zones.length?r.zones.map(z=>'<span class="z">'+esc(z)+'</span>').join(''):'<span class="nodrop">（特殊/世界王召喚，不在一般地圖）</span>';
    return `<div class="card" style="--bcol:${bcol}">
      <div class="top"><span class="nm">${hl(r.n)}</span><span class="tag" style="background:${bcol}">Lv${r.lv}</span>${r.boss?'<span class="tag" style="background:#fbbf24">世界王</span>':''}<span style="font-size:12px;color:#a99a7a">${r.size}${r.un?'·不死':''}${r.isWolf?'·狼人':''}</span></div>
      <div class="meta"><span><b>HP</b> ${r.hp.toLocaleString()}</span><span><b>經驗</b> ${r.exp.toLocaleString()}</span><span><b>金幣</b> ${r.gold[0]}~${r.gold[1]}</span></div>
      <div class="loc"><b>出沒地點：</b>${loc}</div>
      <div class="drops">${drops}</div></div>`;
  }).join(''):'<div class="empty">沒有符合條件的怪物</div>';
}
document.querySelectorAll('.chip.cat').forEach(c=>c.onclick=()=>{fCat=c.dataset.cat;document.querySelectorAll('.chip.cat').forEach(x=>x.classList.remove('on'));c.classList.add('on');render();});
document.getElementById('q').oninput=e=>{fQ=e.target.value.trim();render();};
render();
</script></body></html>
