let fCat = '', fCls = '', fImpl = '', fQ = '';
const grid = document.getElementById('grid');
function lvls(r){const a=[];if(r.reqK)a.push('騎 Lv'+r.reqK);if(r.reqM)a.push('法 Lv'+r.reqM);if(r.reqE)a.push('妖 Lv'+r.reqE);return a.join(' / ')||'—';}
function render(){
  const list = DATA.filter(r =>
    (!fCat || r.cat===fCat) && (!fCls || r.cls.includes(fCls)) &&
    (fImpl===''|| (fImpl==='1')===r.impl) && (!fQ || r.n.includes(fQ)));
  grid.innerHTML = list.length ? list.map(r => `
    <div class="card" style="--color:${r.color}">
      <div class="top">
        <span class="nm">${r.n}</span>
        <span class="tag" style="background:${r.color}">${r.cat}</span>
        ${r.impl ? '' : '<span class="pend">待實裝</span>'}
      </div>
      <div class="meta">
        <span><b>階級</b> ${r.tier||'-'}</span>
        <span><b>需求</b> ${lvls(r)}</span>
        <span><b>MP</b> ${r.mp}${r.hpCost?'　<b>HP</b> '+r.hpCost:''}${r.dur?'　<b>持續</b> '+r.dur+'秒':''}</span>
      </div>
      <div class="desc">${r.desc}</div>
      ${r.flavor ? '<div class="flavor">「'+r.flavor+'」</div>' : ''}
    </div>`).join('') : '<div class="empty">沒有符合條件的技能</div>';
}
document.querySelectorAll('.chip.cat').forEach(c=>c.onclick=()=>{fCat=c.dataset.cat;document.querySelectorAll('.chip.cat').forEach(x=>{x.classList.remove('on');x.style.background='';x.style.color='';});c.classList.add('on');c.style.background=c.dataset.col||'#f5c451';c.style.color='#15100b';render();});
document.querySelectorAll('.chip.cls').forEach(c=>c.onclick=()=>{fCls=c.dataset.cls;document.querySelectorAll('.chip.cls').forEach(x=>{x.classList.remove('on');x.style.background='';x.style.color='';});c.classList.add('on');c.style.background='#f5c451';c.style.color='#15100b';render();});
document.querySelectorAll('.chip.impl').forEach(c=>c.onclick=()=>{fImpl=c.dataset.impl;document.querySelectorAll('.chip.impl').forEach(x=>{x.classList.remove('on');x.style.background='';x.style.color='';});c.classList.add('on');c.style.background='#f5c451';c.style.color='#15100b';render();});
document.getElementById('q').oninput=e=>{fQ=e.target.value.trim();render();};
render();
